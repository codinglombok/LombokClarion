name: Generate Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/generate-wiki.yml'
  workflow_dispatch:

jobs:
  generate-wiki:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout wiki repository
        uses: actions/checkout@v7
        with:
          repository: codinglombok/LombokCharts.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wiki pages
        run: |
          # Create Home page from README
          cp README.md wiki/Home.md
          
          # Copy API documentation
          if [ -f docs/api.md ]; then
            cp docs/api.md wiki/API-Reference.md
          fi
          
          # Copy theming documentation
          if [ -f docs/theming.md ]; then
            cp docs/theming.md wiki/Theming.md
          fi
          
          # Copy architecture documentation
          if [ -f docs/architecture.md ]; then
            cp docs/architecture.md wiki/Architecture.md
          fi
          
          # Copy porting documentation
          if [ -f docs/porting.md ]; then
            cp docs/porting.md wiki/Porting-Guide.md
          fi
          
          # Create Getting Started page
          cat > wiki/Getting-Started.md << 'EOF'
          # Getting Started with LombokCharts
          
          ## Installation
          
          ### npm
          \`\`\`bash
          npm install lombok-charts
          \`\`\`
          
          ### pnpm
          \`\`\`bash
          pnpm add lombok-charts
          \`\`\`
          
          ### yarn
          \`\`\`bash
          yarn add lombok-charts
          \`\`\`
          
          ## Quick Start
          
          ### Basic Usage
          
          \`\`\`javascript
          import { chart } from 'lombok-charts';
          
          chart('#app', {
            data: [
              { label: 'Q1', value: 120 },
              { label: 'Q2', value: 200 },
              { label: 'Q3', value: 150 },
              { label: 'Q4', value: 280 },
            ],
            mark: 'bar',
            title: 'Quarterly Revenue',
          });
          \`\`\`
          
          ### Via CDN (no build step)
          
          \`\`\`html
          <script src="https://cdn.jsdelivr.net/npm/lombok-charts/dist/lombok-charts.umd.min.js"></script>
          <script>
            LombokCharts.chart('#app', {
              data: [{ label: 'A', value: 10 }],
              mark: 'bar'
            });
          </script>
          \`\`\`
          EOF

      - name: Create _Sidebar.md
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          # Documentation
          
          - [[Home|Home]]
          - [[Getting Started|Getting-Started]]
          - [[API Reference|API-Reference]]
          - [[Theming|Theming]]
          - [[Architecture|Architecture]]
          - [[Porting Guide|Porting-Guide]]
          EOF

      - name: Create _Footer.md
        run: |
          cat > wiki/_Footer.md << 'EOF'
          ---
          *LombokCharts v0.1.0 - Zero-Dependency Charting Library*
          
          [Repository](https://github.com/codinglombok/LombokCharts) | [npm Package](https://www.npmjs.com/package/lombok-charts) | [License](https://github.com/codinglombok/LombokCharts/blob/main/LICENSE)
          EOF

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-generate wiki from repository documentation"
            git push origin master
            echo "Wiki updated successfully"
          fi
