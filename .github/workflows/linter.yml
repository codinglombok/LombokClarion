name: Super-Linter

on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # wajib agar diff "changed files only" berfungsi

      - name: Lint Code Base
        uses: super-linter/super-linter@v8.7.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Jangan lint hasil build, snapshot, dan vendor
          FILTER_REGEX_EXCLUDE: (^|/)(dist|node_modules|site|docs)/|tests/visual/__snapshots__/
          # Menyalakan satu VALIDATE_* mematikan semua yang lain
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_CSS: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
