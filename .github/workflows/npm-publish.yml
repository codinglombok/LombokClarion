name: Publish to npm
on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual trigger fallback
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }  # id-token for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: pdo_sqlite }
      - name: Quality gate before publish
        run: |
          php tests/run-all.php
          php bin/check-domain-boundary.php
      - uses: actions/setup-node@v4
        with: { node-version: '20', registry-url: 'https://registry.npmjs.org' }
      - name: Sync version from release tag (v1.2.3 -> 1.2.3)
        if: github.event_name == 'release'
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
