services:
  app:
    build: .
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?set APP_KEY}
      THEME_STYLE: ${THEME_STYLE:-resonant-stark}
      DB_DRIVER: pgsql
      DB_PATH: "pgsql:host=db;dbname=app"
    depends_on: [db]
    volumes: [appstorage:/var/www/app/storage]

  web:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/app/public:ro
    depends_on: [app]

  worker:
    build:
      context: .
      target: worker
    environment:
      APP_KEY: ${APP_KEY:?set APP_KEY}
      DB_DRIVER: pgsql
      DB_PATH: "pgsql:host=db;dbname=app"
    depends_on: [db]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes: [dbdata:/var/lib/postgresql/data]

volumes: { appstorage: {}, dbdata: {} }
